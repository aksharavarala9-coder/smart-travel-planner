<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveler Reviews | Smart Travel Planner India</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2 class="nav-brand" style="margin-bottom: 2rem;">SmartIndia</h2>
            <nav class="sidebar-nav">
                <a href="../index.html" class="sidebar-link">Home</a>
                <a href="dashboard.html" class="sidebar-link">Dashboard</a>
                <a href="planner.html" class="sidebar-link">Plan New Trip</a>
                <a href="expenses.html" class="sidebar-link">Manage Expenses</a>
                <a href="reviews.html" class="sidebar-link active">Traveler Reviews</a>
            </nav>
            <div style="margin-top: auto;">
                <div id="user-info" style="margin-bottom: 1rem; font-weight: 500;"></div>
                <button onclick="Auth.logout()" class="btn btn-secondary btn-block">Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Traveler Reviews</h1>
                <select id="destination-filter" class="form-control" style="width: 250px;">
                    <option value="">All Destinations</option>
                    <option value="Hyderabad">Hyderabad</option>
                    <option value="Goa">Goa</option>
                    <option value="Manali">Manali</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Jaipur">Jaipur</option>
                </select>
            </div>

            <div id="alert-container"></div>

            <div class="grid-2">
                <!-- Submit Review Form -->
                <div class="card" style="align-self: start;">
                    <h3 style="margin-bottom: 1.5rem;">Share Your Experience</h3>
                    <form id="review-form">
                        <div class="form-group">
                            <label class="form-label" for="destination">Destination</label>
                            <select id="destination" class="form-control" required>
                                <option value="" disabled selected>Select Destination</option>
                                <option value="Hyderabad">Hyderabad</option>
                                <option value="Goa">Goa</option>
                                <option value="Manali">Manali</option>
                                <option value="Delhi">Delhi</option>
                                <option value="Jaipur">Jaipur</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="rating">Rating</label>
                            <select id="rating" class="form-control" required>
                                <option value="5">⭐⭐⭐⭐⭐ 5/5</option>
                                <option value="4">⭐⭐⭐⭐ 4/5</option>
                                <option value="3">⭐⭐⭐ 3/5</option>
                                <option value="2">⭐⭐ 2/5</option>
                                <option value="1">⭐ 1/5</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="text">Your Review</label>
                            <textarea id="text" class="form-control" rows="4" required placeholder="Tell others about your trip!"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Post Review</button>
                    </form>
                </div>

                <!-- Reviews Feed -->
                <div>
                    <h3 style="margin-bottom: 1.5rem;">Recent Community Reviews</h3>
                    <div id="reviews-feed" style="display: flex; flex-direction: column; gap: 1.5rem;">
                        Loading reviews...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/reviews.js"></script>
</body>
</html>
