<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Smart Travel Planner India</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2 class="nav-brand" style="margin-bottom: 2rem;">SmartIndia</h2>
            <nav class="sidebar-nav">
                <a href="../index.html" class="sidebar-link">Home</a>
                <a href="dashboard.html" class="sidebar-link active">Dashboard</a>
                <a href="planner.html" class="sidebar-link">Plan New Trip</a>
                <a href="expenses.html" class="sidebar-link">Manage Expenses</a>
                <a href="reviews.html" class="sidebar-link">Traveler Reviews</a>
            </nav>
            <div style="margin-top: auto;">
                <div class="card" style="padding: 1rem; margin-bottom: 1rem; background: var(--bg-light); border: none;">
                    <div style="font-weight: 700; color: var(--primary);" id="user-info"></div>
                    <div style="font-size: 0.85rem; color: var(--text-muted);">Travel Enthusiast</div>
                </div>
                <button onclick="Auth.logout()" class="btn btn-secondary btn-block">Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Your Travel Hub</h1>
                <a href="planner.html" class="btn btn-primary">+ Plan New Trip</a>
            </header>

            <div id="alert-container"></div>

            <!-- Dashboard Analytics -->
            <div class="grid-2" style="margin-bottom: 3rem;">
                <div class="card">
                    <h3 style="margin-bottom: 1rem;">Destinations Breakdown</h3>
                    <canvas id="tripsChart" style="max-height: 250px;"></canvas>
                </div>
                <div class="card">
                    <h3 style="margin-bottom: 1rem;">Budget Overview</h3>
                    <canvas id="budgetChart" style="max-height: 250px;"></canvas>
                </div>
            </div>

            <h2 style="margin-bottom: 1.5rem; color: var(--text-main);">Your Itineraries</h2>
            <div class="grid-3" id="trips-container">
                <!-- Trips will be inserted here dynamically -->
                <div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 3rem;">
                    Loading your adventures...
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
