<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Smart Travel Planner</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2 class="nav-brand" style="margin-bottom: 2rem;">Smart Travel</h2>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link active">Dashboard</a>
                <a href="planner.html" class="sidebar-link">Plan New Trip</a>
                <a href="expenses.html" class="sidebar-link">Manage Expenses</a>
            </nav>
            <div style="margin-top: auto;">
                <div id="user-info" style="margin-bottom: 1rem; font-weight: 500;"></div>
                <button onclick="Auth.logout()" class="btn btn-secondary btn-block">Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Your Trips</h1>
                <a href="planner.html" class="btn btn-primary">+ New Trip</a>
            </header>

            <div id="alert-container"></div>

            <div class="grid-3" id="trips-container">
                <!-- Trips will be inserted here dynamically -->
                <div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 3rem;">
                    Loading trips...
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
