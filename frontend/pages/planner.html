<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Trip | Smart Travel Planner India</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2 class="nav-brand" style="margin-bottom: 2rem;">SmartIndia</h2>
            <nav class="sidebar-nav">
                <a href="../index.html" class="sidebar-link">Home</a>
                <a href="dashboard.html" class="sidebar-link">Dashboard</a>
                <a href="planner.html" class="sidebar-link active">Plan New Trip</a>
                <a href="expenses.html" class="sidebar-link">Manage Expenses</a>
                <a href="reviews.html" class="sidebar-link">Traveler Reviews</a>
            </nav>
            <div style="margin-top: auto;">
                <div id="user-info" style="margin-bottom: 1rem; font-weight: 500;"></div>
                <button onclick="Auth.logout()" class="btn btn-secondary btn-block">Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <h1 style="margin-bottom: 2rem;">Plan Your Indian Journey</h1>
            <div id="alert-container"></div>

            <div class="grid-2">
                <!-- Trip Form -->
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">Select Destination</h3>
                    <form id="planner-form">
                        <div class="form-group">
                            <label class="form-label" for="destination">Where to?</label>
                            <select id="destination" class="form-control" required>
                                <option value="" disabled selected>Explore Destinations...</option>
                                <option value="Hyderabad">Hyderabad</option>
                                <option value="Goa">Goa</option>
                                <option value="Manali">Manali</option>
                                <option value="Delhi">Delhi</option>
                                <option value="Jaipur">Jaipur</option>
                            </select>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="form-label" for="days">Duration (Days)</label>
                                <input type="number" id="days" class="form-control" required min="1" max="15" placeholder="e.g., 5">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="budget">Total Budget (₹)</label>
                                <input type="number" id="budget" class="form-control" required min="1000" placeholder="e.g., 10000">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Save Trip & View Interactive Map</button>
                    </form>
                </div>

                <!-- Leaflet Map Integration -->
                <div class="card" style="padding: 1rem;">
                    <h3 style="margin-bottom: 1rem; padding-left: 1rem;">Location Map</h3>
                    <div id="map"></div>
                </div>
            </div>

            <!-- Generated Itinerary -->
            <div id="itinerary-container" style="margin-top: 2rem; display: none;">
                <h2 style="margin-bottom: 1.5rem; color: var(--primary);">Your Local Guide</h2>
                <div id="itinerary-content" class="grid-3"></div>
                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
                    <a href="expenses.html" class="btn btn-primary" id="manage-expenses-btn" style="display: none;">Add Group Expenses</a>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="../js/app.js"></script>
    <script src="../js/planner.js"></script>
</body>
</html>
