<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses | Smart Travel Planner</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2 class="nav-brand" style="margin-bottom: 2rem;">Smart Travel</h2>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link">Dashboard</a>
                <a href="planner.html" class="sidebar-link">Plan New Trip</a>
                <a href="expenses.html" class="sidebar-link active">Manage Expenses</a>
            </nav>
            <div style="margin-top: auto;">
                <div id="user-info" style="margin-bottom: 1rem; font-weight: 500;"></div>
                <button onclick="Auth.logout()" class="btn btn-secondary btn-block">Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Group Expenses</h1>
                <span" id="active-trip-name" style="font-weight: 600; color: var(--primary);">Loading trip...</span>
            </div>

            <div id="alert-container"></div>

            <div class="grid-2">
                <!-- Add Expense Form -->
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem;">Add New Expense</h3>
                    <form id="expense-form">
                        <div class="form-group">
                            <label class="form-label" for="description">What was this for?</label>
                            <input type="text" id="description" class="form-control" required placeholder="e.g., Dinner at Luigi's">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="amount">Amount ($)</label>
                            <input type="number" id="amount" class="form-control" required min="1" step="0.01" placeholder="e.g., 120.50">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="paidBy">Who Paid?</label>
                            <input type="text" id="paidBy" class="form-control" required placeholder="e.g., Alice">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="splitAmong">Split Among (comma separated names)</label>
                            <input type="text" id="splitAmong" class="form-control" required placeholder="e.g., Alice, Bob, Charlie">
                            <small style="color: var(--text-muted); display: block; margin-top: 0.25rem;">We will split this equally among the names provided.</small>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Add Expense</button>
                    </form>
                </div>

                <!-- Balances and History -->
                <div>
                    <!-- Balances Summary -->
                    <div class="card" style="margin-bottom: 2rem;">
                        <h3 style="margin-bottom: 1rem;">Who Owes Who</h3>
                        <div id="balances-container" style="background: var(--bg-light); padding: 1rem; border-radius: 0.5rem; font-family: monospace;">
                            Calculating balances...
                        </div>
                    </div>

                    <!-- History -->
                    <div class="card">
                        <h3 style="margin-bottom: 1rem;">Recent Expenses</h3>
                        <div id="expenses-list" style="display: flex; flex-direction: column; gap: 0.75rem;">
                            Loading history...
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/expenses.js"></script>
</body>
</html>
